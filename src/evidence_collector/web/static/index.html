<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evidence Collection</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='16' width='100' height='100' fill='%235c5048'/><path d='M30 52l15 15 25-30' stroke='white' stroke-width='10' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg: #f7f6f4;
  --surface: #ffffff;
  --surface-alt: #f0eee9;
  --agent-bg: #eeecea;
  --agent-fg: #2c2926;
  --user-bg: #e8e5e0;
  --user-fg: #2c2926;
  --accent: #5c5048;
  --accent-soft: #7a6e64;
  --accent-bg: rgba(92, 80, 72, 0.07);
  --teal: #6b7c5e;
  --teal-soft: #e4e9df;
  --rose: #b5745a;
  --rose-bg: #faf0eb;
  --border: #d9d5cf;
  --border-light: #e8e5e0;
  --text: #2c2926;
  --text-secondary: #6b6560;
  --text-muted: #9e9790;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', -apple-system, sans-serif;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.03), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03);
  --shadow-lg: 0 4px 20px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.03);
}

html, body {
  height: 100%;
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

body {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Top bar ─────────────────────────────────────── */
.topbar {
  height: 54px;
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border-light);
  position: relative;
}

.topbar-title {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--accent);
  letter-spacing: 0.4px;
}

.topbar-status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.3px;
}

.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--text-muted);
  transition: background 0.3s;
}

.status-dot.connected { background: var(--teal); box-shadow: 0 0 6px rgba(107, 124, 94, 0.3); }
.status-dot.error { background: var(--rose); }

/* ── Progress bar (below topbar) ─────────────────── */
.run-progress-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--border-light);
  overflow: hidden;
  opacity: 0;
  transition: opacity 0.3s;
}

.run-progress-bar.visible { opacity: 1; }

.run-progress-bar .bar-fill {
  height: 100%;
  width: 0%;
  background: var(--accent);
  transition: width 0.4s ease-out;
}

/* ── Messages area ───────────────────────────────── */
.messages-wrap {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  scroll-behavior: smooth;
  position: relative;
}

.messages-wrap::-webkit-scrollbar { width: 5px; }
.messages-wrap::-webkit-scrollbar-track { background: transparent; }
.messages-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.messages {
  max-width: 740px;
  margin: 0 auto;
  padding: 28px 24px 130px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ── Drop zone overlay ──────────────────────────── */
.drop-zone {
  position: absolute;
  inset: 0;
  background: rgba(92, 80, 72, 0.05);
  border: 2px dashed var(--accent-soft);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 50;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
}

.drop-zone.visible {
  opacity: 1;
}

.drop-zone-text {
  font-family: var(--mono);
  font-size: 14px;
  color: var(--accent);
  font-weight: 500;
  padding: 20px 32px;
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow-md);
}

/* ── Message bubbles ─────────────────────────────── */
.msg {
  display: flex;
  animation: msgIn 0.25s ease-out both;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg.user { justify-content: flex-end; }
.msg.assistant { justify-content: flex-start; }

.msg-bubble {
  max-width: 82%;
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: 14px;
  line-height: 1.6;
  word-break: break-word;
  white-space: pre-wrap;
}

.msg.user .msg-bubble {
  background: var(--user-bg);
  color: var(--user-fg);
  border-bottom-right-radius: 4px;
}

.msg.assistant .msg-bubble {
  background: var(--agent-bg);
  color: var(--agent-fg);
  border-bottom-left-radius: 4px;
}

/* ── Info bubbles (columns detected, etc.) ───────── */
.info-card {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 16px 20px;
  max-width: 82%;
  box-shadow: var(--shadow-sm);
  animation: msgIn 0.25s ease-out both;
}

.info-card .info-label {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--accent);
  margin-bottom: 10px;
}

.info-card .info-text {
  font-size: 13.5px;
  color: var(--text-secondary);
  line-height: 1.5;
}

.info-card .columns-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
}

.info-card .col-tag {
  font-family: var(--mono);
  font-size: 11px;
  padding: 4px 10px;
  background: var(--accent-bg);
  border-radius: 6px;
  color: var(--accent);
}

/* ── Task preview card ───────────────────────────── */
.task-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  max-width: 88%;
  box-shadow: var(--shadow-md);
  animation: msgIn 0.3s ease-out both;
  overflow: hidden;
}

.task-card-header {
  background: var(--accent-bg);
  border-bottom: 1px solid var(--border-light);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  user-select: none;
}

.task-card-header .task-icon {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.task-card-header .task-title {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--accent);
  letter-spacing: 0.3px;
  flex: 1;
}

.task-card-header .approved-badge {
  font-family: var(--mono);
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--teal-soft);
  color: var(--teal);
  font-weight: 500;
  letter-spacing: 0.3px;
}

.task-card-header .collapse-chevron {
  width: 16px;
  height: 16px;
  color: var(--text-muted);
  transition: transform 0.2s;
  flex-shrink: 0;
}

.task-card.collapsed .collapse-chevron {
  transform: rotate(-90deg);
}

.task-card-body,
.task-card-actions {
  transition: max-height 0.3s ease, opacity 0.2s ease, padding 0.3s ease;
  overflow: hidden;
}

.task-card.collapsed .task-card-body,
.task-card.collapsed .task-card-actions {
  max-height: 0;
  opacity: 0;
  padding-top: 0;
  padding-bottom: 0;
}

.task-card-body {
  padding: 20px;
}

.task-field {
  margin-bottom: 16px;
}

.task-field:last-child {
  margin-bottom: 0;
}

.task-field-label {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.task-field-value {
  font-size: 13.5px;
  color: var(--text);
  line-height: 1.6;
}

.task-field-value.mono {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--accent);
}

.task-field-list {
  list-style: none;
  padding: 0;
}

.task-field-list li {
  font-size: 13px;
  color: var(--text-secondary);
  padding: 3px 0;
  padding-left: 16px;
  position: relative;
  line-height: 1.5;
}

.task-field-list li::before {
  content: '\2013';
  position: absolute;
  left: 0;
  color: var(--text-muted);
}

.task-card-actions {
  display: flex;
  gap: 10px;
  padding: 4px 20px 20px;
}

.btn {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  padding: 9px 22px;
  border-radius: var(--radius-sm);
  border: none;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-approve {
  background: var(--accent);
  color: #fff;
}

.btn-approve:hover {
  background: var(--accent-soft);
  box-shadow: 0 2px 10px rgba(92, 80, 72, 0.2);
}

.btn-revise {
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid var(--border);
}

.btn-revise:hover {
  background: var(--surface-alt);
}

.btn-new-session {
  background: transparent;
  color: var(--text-muted);
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 500;
  padding: 0;
  border: none;
  cursor: pointer;
  width: 100%;
  text-align: center;
  transition: color 0.15s;
}

.btn-new-session:hover {
  color: var(--text);
}

/* ── Progress lines ──────────────────────────────── */
.progress-group {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 16px 20px;
  max-width: 88%;
  animation: msgIn 0.2s ease-out both;
  box-shadow: var(--shadow-sm);
}

.progress-group-header {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  user-select: none;
}

.progress-group-header .sample-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--accent-bg);
  color: var(--accent);
  font-weight: 500;
  letter-spacing: 0.3px;
}

.progress-group-header .collapse-chevron {
  width: 14px;
  height: 14px;
  color: var(--text-muted);
  transition: transform 0.2s;
  flex-shrink: 0;
  margin-left: auto;
}

.progress-group-header .prog-summary {
  font-size: 11px;
  color: var(--text-muted);
  margin-left: auto;
}

.progress-group.collapsed .collapse-chevron {
  transform: rotate(-90deg);
}

.progress-group .prog-entries {
  display: flex;
  flex-direction: column;
  gap: 2px;
  overflow: hidden;
  transition: max-height 0.3s ease, opacity 0.2s ease;
}

.progress-group.collapsed .prog-entries {
  max-height: 0;
  opacity: 0;
}

.progress-group.collapsed .progress-group-header {
  margin-bottom: 0;
}

.progress-line {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 3px 0;
  animation: progIn 0.15s ease-out both;
}

@keyframes progIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.progress-line .prog-icon {
  width: 16px;
  height: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}

.progress-line .prog-icon svg {
  width: 12px;
  height: 12px;
}

.progress-line .prog-text {
  font-family: var(--mono);
  font-size: 11.5px;
  color: var(--text-muted);
  line-height: 1.5;
  word-break: break-all;
}

/* Sample-level lines rendered as standalone cards */
.sample-start-line {
  animation: msgIn 0.2s ease-out both;
}

.sample-end-line {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--teal);
  padding: 6px 0;
  display: flex;
  align-items: center;
  gap: 8px;
  animation: msgIn 0.2s ease-out both;
}

.sample-end-line svg {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
}

/* Record field lines get a teal highlight */
.progress-line.record .prog-text {
  color: var(--teal);
}

.progress-line.error .prog-text {
  color: var(--rose);
}

/* ── Results card ────────────────────────────────── */
.results-card {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  max-width: 88%;
  box-shadow: var(--shadow-md);
  animation: msgIn 0.3s ease-out both;
  overflow: hidden;
}

.results-header {
  padding: 16px 20px;
  background: var(--teal-soft);
  border-bottom: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  gap: 10px;
}

.results-header svg { flex-shrink: 0; }

.results-header span {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--teal);
  letter-spacing: 0.3px;
}

.results-body {
  padding: 20px;
}

.results-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 20px;
}

.results-stat {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-secondary);
  letter-spacing: 0.2px;
}

.results-stat .stat-value {
  font-weight: 600;
  color: var(--text);
}

.results-stat .stat-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--border);
}

.results-actions {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

.btn-download-zip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  border: none;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  transition: all 0.15s;
  text-decoration: none;
}

.btn-download-zip:hover {
  background: var(--accent-soft);
  box-shadow: 0 2px 10px rgba(92, 80, 72, 0.2);
}

.btn-download-zip svg {
  flex-shrink: 0;
}

.results-file-link {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  text-decoration: none;
  padding: 6px 12px;
  border-radius: 6px;
  background: var(--accent-bg);
  transition: background 0.15s;
}

.results-file-link:hover {
  background: rgba(92, 80, 72, 0.12);
}

/* ── Input bar ───────────────────────────────────── */
.input-bar-wrap {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(to bottom, rgba(250,249,247,0), var(--bg) 24%);
  padding: 20px 24px 24px;
  pointer-events: none;
}

.input-bar {
  max-width: 740px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 6px 8px 6px 16px;
  box-shadow: var(--shadow-lg);
  pointer-events: all;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.input-bar:focus-within {
  border-color: var(--accent-soft);
  box-shadow: var(--shadow-lg), 0 0 0 2px rgba(92, 80, 72, 0.08);
}

.input-bar.disabled {
  opacity: 0.5;
  pointer-events: none;
}

.input-bar textarea {
  flex: 1;
  font-family: var(--sans);
  font-size: 14px;
  border: none;
  outline: none;
  resize: none;
  background: transparent;
  color: var(--text);
  line-height: 1.5;
  max-height: 120px;
  min-height: 22px;
  padding: 8px 0;
}

.input-bar textarea::placeholder {
  color: var(--text-muted);
}

.input-btn {
  width: 36px;
  height: 36px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
  background: transparent;
  color: var(--text-muted);
}

.input-btn:hover {
  background: var(--surface-alt);
  color: var(--text-secondary);
}

.input-btn.send-btn {
  background: var(--accent);
  color: #fff;
}

.input-btn.send-btn:hover {
  background: var(--accent-soft);
}

.input-btn.send-btn:disabled {
  background: var(--surface-alt);
  color: var(--text-muted);
  cursor: default;
}

.input-btn.cancel-btn {
  background: var(--rose);
  color: #fff;
}

.input-btn.cancel-btn:hover {
  background: #a5654d;
}

/* ── Error toast ─────────────────────────────────── */
.error-bubble {
  background: var(--rose-bg);
  border: 1px solid #e8d4cb;
  border-radius: var(--radius);
  padding: 12px 16px;
  max-width: 82%;
  animation: msgIn 0.25s ease-out both;
}

.error-bubble .error-text {
  font-size: 13px;
  color: var(--rose);
  line-height: 1.5;
}

/* ── Thinking indicator ──────────────────────────── */
.thinking {
  display: flex;
  gap: 5px;
  padding: 14px 16px;
  animation: msgIn 0.2s ease-out both;
}

.thinking span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent-soft);
  animation: dotBounce 1.2s ease-in-out infinite;
}

.thinking span:nth-child(2) { animation-delay: 0.15s; }
.thinking span:nth-child(3) { animation-delay: 0.3s; }

@keyframes dotBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.35; }
  30% { transform: translateY(-5px); opacity: 1; }
}
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-title">Evidence Collection</div>
  <div class="topbar-status">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">connecting</span>
  </div>
  <div class="run-progress-bar" id="runProgressBar">
    <div class="bar-fill" id="barFill"></div>
  </div>
</div>

<!-- Messages -->
<div class="messages-wrap" id="messagesWrap">
  <div class="drop-zone" id="dropZone">
    <div class="drop-zone-text">Drop CSV/XLSX here</div>
  </div>
  <div class="messages" id="messages"></div>
</div>

<!-- Input bar -->
<div class="input-bar-wrap">
  <div class="input-bar" id="inputBar">
    <button class="input-btn upload-btn" id="uploadBtn" title="Upload CSV/XLSX">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
      </svg>
    </button>
    <textarea id="input" rows="1" placeholder="Describe the evidence you need to collect..." autocomplete="off"></textarea>
    <button class="input-btn send-btn" id="sendBtn" title="Send">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>

<!-- Hidden file input -->
<input type="file" id="fileInput" accept=".csv,.xlsx,.xls" style="display:none">

<script>
(function() {
  // ── State ──────────────────────────────────────
  let state = 'chat'; // chat | running | done
  let ws = null;
  let pendingTask = null;
  let currentProgressGroup = null;
  let totalSamples = 0;
  let completedSamples = 0;
  let elapsedTimer = null;
  let runStartTime = null;

  // ── DOM refs ───────────────────────────────────
  const $messages = document.getElementById('messages');
  const $wrap = document.getElementById('messagesWrap');
  const $input = document.getElementById('input');
  const $sendBtn = document.getElementById('sendBtn');
  const $uploadBtn = document.getElementById('uploadBtn');
  const $fileInput = document.getElementById('fileInput');
  const $inputBar = document.getElementById('inputBar');
  const $statusDot = document.getElementById('statusDot');
  const $statusText = document.getElementById('statusText');
  const $progressBar = document.getElementById('runProgressBar');
  const $barFill = document.getElementById('barFill');
  const $dropZone = document.getElementById('dropZone');

  // ── SVG icons ──────────────────────────────────
  const icons = {
    navigate: '<svg viewBox="0 0 24 24" fill="none" stroke="#9e9790" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/></svg>',
    read: '<svg viewBox="0 0 24 24" fill="none" stroke="#9e9790" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>',
    screenshot: '<svg viewBox="0 0 24 24" fill="none" stroke="#9e9790" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>',
    record: '<svg viewBox="0 0 24 24" fill="none" stroke="#6b7c5e" stroke-width="2" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg>',
    click: '<svg viewBox="0 0 24 24" fill="none" stroke="#9e9790" stroke-width="2" stroke-linecap="round"><path d="M15 15l-2 5L9 9l11 4-5 2z"/></svg>',
    scroll: '<svg viewBox="0 0 24 24" fill="none" stroke="#9e9790" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>',
    generic: '<svg viewBox="0 0 24 24" fill="none" stroke="#9e9790" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/></svg>',
    done: '<svg viewBox="0 0 24 24" fill="none" stroke="#6b7c5e" stroke-width="2" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>',
    chevron: '<svg class="collapse-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>',
  };

  function iconForTool(msg) {
    if (msg.startsWith('Opening') || msg.startsWith('Getting page')) return icons.navigate;
    if (msg.startsWith('Reading') || msg.startsWith('Querying') || msg.startsWith('Searching') || msg.startsWith('Checking')) return icons.read;
    if (msg.startsWith('Taking screenshot')) return icons.screenshot;
    if (msg.startsWith('Recorded')) return icons.record;
    if (msg.startsWith('Clicking')) return icons.click;
    if (msg.startsWith('Scrolling')) return icons.scroll;
    if (msg.startsWith('Executing JavaScript')) return icons.generic;
    if (msg.startsWith('Downloading')) return icons.navigate;
    if (msg.startsWith('Closing')) return icons.generic;
    return icons.generic;
  }

  // ── Helpers ────────────────────────────────────
  function scrollBottom() {
    requestAnimationFrame(() => {
      $wrap.scrollTop = $wrap.scrollHeight;
    });
  }

  function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function setStatus(label, type) {
    $statusText.textContent = label;
    $statusDot.className = 'status-dot' + (type ? ' ' + type : '');
  }

  function setInputEnabled(enabled) {
    if (enabled) {
      $inputBar.classList.remove('disabled');
      $input.disabled = false;
    } else {
      $inputBar.classList.add('disabled');
      $input.disabled = true;
    }
  }

  function formatElapsed(seconds) {
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);
    return m + ':' + String(s).padStart(2, '0');
  }

  function updatePageTitle() {
    if (state === 'chat') {
      document.title = 'Evidence Collection';
    } else if (state === 'running') {
      const idx = completedSamples + 1;
      const total = totalSamples || '?';
      document.title = `Running (${idx}/${total}) - Evidence Collection`;
    } else if (state === 'done') {
      document.title = 'Complete - Evidence Collection';
    }
  }

  function startElapsedTimer() {
    runStartTime = Date.now();
    elapsedTimer = setInterval(() => {
      const elapsed = (Date.now() - runStartTime) / 1000;
      setStatus('running - ' + formatElapsed(elapsed), 'connected');
    }, 1000);
  }

  function stopElapsedTimer() {
    if (elapsedTimer) {
      clearInterval(elapsedTimer);
      elapsedTimer = null;
    }
    if (runStartTime) {
      const elapsed = (Date.now() - runStartTime) / 1000;
      setStatus('complete - ' + formatElapsed(elapsed), 'connected');
    }
  }

  function updateProgressBar() {
    if (totalSamples > 0) {
      const pct = Math.min((completedSamples / totalSamples) * 100, 100);
      $barFill.style.width = pct + '%';
    }
  }

  function collapseProgressGroup(group) {
    if (!group || group.classList.contains('collapsed')) return;
    const entries = group.querySelector('.prog-entries');
    const stepCount = entries ? entries.children.length : 0;
    // Find status from sample-end-line if present
    const endLine = entries ? entries.querySelector('.sample-end-line span') : null;
    const statusText = endLine ? endLine.textContent : 'done';

    // Add summary text to header
    const header = group.querySelector('.progress-group-header');
    if (header && !header.querySelector('.prog-summary')) {
      const summary = document.createElement('span');
      summary.className = 'prog-summary';
      summary.textContent = stepCount + ' steps - ' + statusText;
      // Insert before chevron
      const chevron = header.querySelector('.collapse-chevron');
      if (chevron) {
        header.insertBefore(summary, chevron);
      } else {
        header.appendChild(summary);
      }
    }
    group.classList.add('collapsed');
  }

  // ── Renderers ──────────────────────────────────

  function addUserMsg(text) {
    const el = document.createElement('div');
    el.className = 'msg user';
    el.innerHTML = `<div class="msg-bubble">${escHtml(text)}</div>`;
    $messages.appendChild(el);
    scrollBottom();
  }

  function addAssistantMsg(text) {
    const el = document.createElement('div');
    el.className = 'msg assistant';
    el.innerHTML = `<div class="msg-bubble">${escHtml(text)}</div>`;
    $messages.appendChild(el);
    scrollBottom();
  }

  let thinkingEl = null;
  function showThinking() {
    if (thinkingEl) return;
    thinkingEl = document.createElement('div');
    thinkingEl.className = 'msg assistant';
    thinkingEl.innerHTML = '<div class="thinking"><span></span><span></span><span></span></div>';
    $messages.appendChild(thinkingEl);
    scrollBottom();
  }

  function hideThinking() {
    if (thinkingEl) {
      thinkingEl.remove();
      thinkingEl = null;
    }
  }

  function addInfoCard(label, html) {
    const el = document.createElement('div');
    el.className = 'info-card';
    el.innerHTML = `<div class="info-label">${escHtml(label)}</div><div class="info-text">${html}</div>`;
    $messages.appendChild(el);
    scrollBottom();
  }

  function addColumnsDetected(data) {
    const cols = (data.columns || []).map(c => `<span class="col-tag">${escHtml(c)}</span>`).join('');
    const html = `${escHtml(data.filename || 'File')} &mdash; ${data.row_count} rows<div class="columns-list">${cols}</div>`;
    addInfoCard('File uploaded', html);
  }

  function addTaskPreview(task) {
    pendingTask = task;
    const el = document.createElement('div');
    el.className = 'task-card';
    el.id = 'taskCard';

    const outputFields = (task.output_schema || []).map(f =>
      `<li><strong>${escHtml(f.name)}</strong>: ${escHtml(f.description)}${f.required === false ? ' (optional)' : ''}</li>`
    ).join('');

    const constraints = (task.constraints || []).map(c =>
      `<li>${escHtml(c)}</li>`
    ).join('');

    el.innerHTML = `
      <div class="task-card-header" onclick="toggleTaskCard()">
        <div class="task-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>
          </svg>
        </div>
        <span class="task-title">${escHtml(task.task_name)}</span>
        ${icons.chevron}
      </div>
      <div class="task-card-body">
        <div class="task-field">
          <div class="task-field-label">Goal</div>
          <div class="task-field-value">${escHtml(task.goal)}</div>
        </div>
        <div class="task-field">
          <div class="task-field-label">Instructions</div>
          <div class="task-field-value" style="white-space:pre-wrap">${escHtml(task.instructions)}</div>
        </div>
        <div class="task-field">
          <div class="task-field-label">Input columns</div>
          <div class="task-field-value mono">${(task.input_columns||[]).map(c => escHtml(c)).join(', ')}</div>
        </div>
        <div class="task-field">
          <div class="task-field-label">Output fields</div>
          <ul class="task-field-list">${outputFields}</ul>
        </div>
        ${constraints ? `<div class="task-field"><div class="task-field-label">Constraints</div><ul class="task-field-list">${constraints}</ul></div>` : ''}
      </div>
      <div class="task-card-actions">
        <button class="btn btn-approve" onclick="approveTask()">Approve &amp; Run</button>
        <button class="btn btn-revise" onclick="reviseTask()">Revise</button>
      </div>
    `;
    $messages.appendChild(el);
    scrollBottom();
  }

  window.toggleTaskCard = function() {
    const card = document.getElementById('taskCard');
    if (card) card.classList.toggle('collapsed');
  };

  function addProgressLine(data) {
    const evtType = data.event_type || '';
    const msg = data.message || '';

    if (evtType === 'sample_start') {
      // Collapse previous group
      if (currentProgressGroup) {
        collapseProgressGroup(currentProgressGroup);
      }

      currentProgressGroup = document.createElement('div');
      currentProgressGroup.className = 'progress-group';
      currentProgressGroup.dataset.stepCount = '0';
      const idx = (data.sample_index || 0) + 1;
      const total = data.total || 0;
      const sid = data.sample_id || '';
      currentProgressGroup.innerHTML = `
        <div class="progress-group-header" onclick="toggleProgressGroup(this.parentNode)">
          <span class="sample-badge">${idx} / ${total}</span>
          ${escHtml(sid)}
          ${icons.chevron}
        </div>
        <div class="prog-entries"></div>
      `;
      $messages.appendChild(currentProgressGroup);
      // Update progress bar for new sample
      updatePageTitle();
      scrollBottom();
      return;
    }

    if (evtType === 'sample_end') {
      completedSamples = (data.sample_index || 0) + 1;
      updateProgressBar();
      updatePageTitle();

      if (currentProgressGroup) {
        const entries = currentProgressGroup.querySelector('.prog-entries');
        const el = document.createElement('div');
        el.className = 'sample-end-line';
        el.innerHTML = `${icons.done} <span>${escHtml(data.status || 'done')}</span>`;
        if (entries) entries.appendChild(el);
      }
      scrollBottom();
      return;
    }

    // Tool call line
    const el = document.createElement('div');
    const isRecord = msg.startsWith('Recorded');
    el.className = `progress-line${isRecord ? ' record' : ''}`;

    // Truncate record_field values in display
    let displayMsg = msg;
    if (isRecord) {
      const eqIdx = msg.indexOf(' = ');
      if (eqIdx !== -1) {
        const valPart = msg.substring(eqIdx + 3);
        if (valPart.length > 60) {
          displayMsg = msg.substring(0, eqIdx + 3) + valPart.substring(0, 60) + '...';
        }
      }
    }

    el.innerHTML = `<div class="prog-icon">${iconForTool(msg)}</div><div class="prog-text">${escHtml(displayMsg)}</div>`;

    if (currentProgressGroup) {
      const entries = currentProgressGroup.querySelector('.prog-entries');
      if (entries) entries.appendChild(el);
      currentProgressGroup.dataset.stepCount = String(
        parseInt(currentProgressGroup.dataset.stepCount || '0') + 1
      );
    } else {
      $messages.appendChild(el);
    }
    scrollBottom();
  }

  window.toggleProgressGroup = function(group) {
    if (group) group.classList.toggle('collapsed');
  };

  function addError(message) {
    const el = document.createElement('div');
    el.className = 'error-bubble';
    el.innerHTML = `<div class="error-text">${escHtml(message)}</div>`;
    $messages.appendChild(el);
    scrollBottom();
  }

  function addResultsCard(data) {
    const el = document.createElement('div');
    el.className = 'results-card';

    // Build stats line
    const stats = [];
    if (data.sample_count) stats.push(`<span class="stat-value">${data.sample_count}</span> samples`);
    if (data.screenshot_count) stats.push(`<span class="stat-value">${data.screenshot_count}</span> screenshots`);
    if (data.download_count) stats.push(`<span class="stat-value">${data.download_count}</span> downloads`);
    if (data.trace_count) stats.push(`<span class="stat-value">${data.trace_count}</span> traces`);

    const statsHtml = stats
      .map((s, i) => `<span class="results-stat">${i > 0 ? '<span class="stat-dot"></span>' : ''}${s}</span>`)
      .join('');

    // Quick-access links for top-level files
    const quickLinks = (data.top_files || [])
      .map(f => `<a class="results-file-link" href="${escHtml(f.url)}" download>${escHtml(f.name)}</a>`)
      .join('');

    el.innerHTML = `
      <div class="results-header">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6b7c5e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/>
        </svg>
        <span>Run Complete</span>
      </div>
      <div class="results-body">
        ${statsHtml ? `<div class="results-stats">${statsHtml}</div>` : ''}
        <div class="results-actions">
          <a class="btn-download-zip" href="${escHtml(data.zip_url)}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download All (.zip)
          </a>
          ${quickLinks}
        </div>
      </div>
    `;
    $messages.appendChild(el);
    scrollBottom();
  }

  function showNewSessionButton() {
    $inputBar.innerHTML = `
      <span class="btn-new-session">New Session</span>
    `;
    $inputBar.style.padding = '6px 12px';
    $inputBar.style.justifyContent = 'center';
    $inputBar.style.cursor = 'pointer';
    $inputBar.classList.remove('disabled');
    $inputBar.onclick = () => location.reload();
  }

  // ── WebSocket ──────────────────────────────────

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/api/ws`);

    ws.onopen = () => {
      setStatus('connected', 'connected');
    };

    ws.onclose = () => {
      setStatus('disconnected', 'error');
      setTimeout(connect, 3000);
    };

    ws.onerror = () => {
      setStatus('error', 'error');
    };

    ws.onmessage = (evt) => {
      hideThinking();
      let data;
      try { data = JSON.parse(evt.data); } catch { return; }

      switch (data.type) {
        case 'chat':
          addAssistantMsg(data.text || '');
          break;

        case 'task_preview':
          addTaskPreview(data.task);
          break;

        case 'columns_detected':
          addColumnsDetected(data);
          break;

        case 'run_started':
          totalSamples = data.total_samples || 0;
          completedSamples = 0;
          $progressBar.classList.add('visible');
          updateProgressBar();
          startElapsedTimer();
          updatePageTitle();
          break;

        case 'progress':
          addProgressLine(data);
          break;

        case 'execution_complete':
          state = 'done';
          stopElapsedTimer();
          $progressBar.classList.remove('visible');
          updatePageTitle();
          showNewSessionButton();
          // Collapse last progress group
          if (currentProgressGroup) {
            collapseProgressGroup(currentProgressGroup);
          }
          break;

        case 'download_ready':
          addResultsCard(data);
          break;

        case 'error':
          addError(data.message || 'Unknown error');
          break;
      }
    };
  }

  function send(obj) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(obj));
    }
  }

  // ── Actions ────────────────────────────────────

  function sendMessage() {
    const text = $input.value.trim();
    if (!text) return;
    addUserMsg(text);
    send({ type: 'chat', text });
    $input.value = '';
    autoResize();
    showThinking();
  }

  window.approveTask = function() {
    const actions = document.querySelectorAll('.task-card-actions');
    actions.forEach(a => a.remove());

    // Collapse task card with "Approved" badge
    const taskCard = document.getElementById('taskCard');
    if (taskCard) {
      const header = taskCard.querySelector('.task-card-header');
      if (header && !header.querySelector('.approved-badge')) {
        const badge = document.createElement('span');
        badge.className = 'approved-badge';
        badge.textContent = 'Approved';
        const chevron = header.querySelector('.collapse-chevron');
        if (chevron) header.insertBefore(badge, chevron);
        else header.appendChild(badge);
      }
      taskCard.classList.add('collapsed');
    }

    send({ type: 'confirm_task', approved: true });
    state = 'running';
    setStatus('running', 'connected');
    setInputEnabled(false);
    $input.placeholder = 'Agent is running...';
    updatePageTitle();

    $sendBtn.style.display = 'none';
    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'input-btn cancel-btn';
    cancelBtn.title = 'Cancel';
    cancelBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
    cancelBtn.onclick = () => {
      send({ type: 'cancel' });
      cancelBtn.remove();
      $sendBtn.style.display = '';
      setInputEnabled(true);
      state = 'done';
      stopElapsedTimer();
      updatePageTitle();
    };
    $sendBtn.parentNode.appendChild(cancelBtn);
    $inputBar.classList.remove('disabled');
  };

  window.reviseTask = function() {
    const actions = document.querySelectorAll('.task-card-actions');
    actions.forEach(a => a.remove());
    addAssistantMsg("Sure, what would you like me to change about the task?");
    $input.focus();
  };

  // ── File upload ────────────────────────────────

  async function handleFileUpload(file) {
    addUserMsg(`Uploaded: ${file.name}`);
    showThinking();

    const formData = new FormData();
    formData.append('file', file);

    try {
      const resp = await fetch('/api/upload', { method: 'POST', body: formData });
      const result = await resp.json();
      hideThinking();
      send({ type: 'upload_done', file_id: result.file_id, filename: result.filename });
    } catch (err) {
      hideThinking();
      addError('File upload failed: ' + err.message);
    }
  }

  $uploadBtn.addEventListener('click', () => {
    $fileInput.click();
  });

  $fileInput.addEventListener('change', async () => {
    const file = $fileInput.files[0];
    if (!file) return;
    $fileInput.value = '';
    await handleFileUpload(file);
  });

  // ── Drag and drop ─────────────────────────────

  let dragCounter = 0;

  $wrap.addEventListener('dragenter', (e) => {
    e.preventDefault();
    dragCounter++;
    $dropZone.classList.add('visible');
  });

  $wrap.addEventListener('dragleave', (e) => {
    e.preventDefault();
    dragCounter--;
    if (dragCounter <= 0) {
      dragCounter = 0;
      $dropZone.classList.remove('visible');
    }
  });

  $wrap.addEventListener('dragover', (e) => {
    e.preventDefault();
  });

  $wrap.addEventListener('drop', async (e) => {
    e.preventDefault();
    dragCounter = 0;
    $dropZone.classList.remove('visible');

    const files = e.dataTransfer.files;
    if (files.length > 0) {
      const file = files[0];
      const ext = file.name.split('.').pop().toLowerCase();
      if (['csv', 'xlsx', 'xls'].includes(ext)) {
        await handleFileUpload(file);
      } else {
        addError('Please drop a CSV or XLSX file.');
      }
    }
  });

  // ── Input handling ─────────────────────────────

  $input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  $sendBtn.addEventListener('click', sendMessage);

  function autoResize() {
    $input.style.height = 'auto';
    $input.style.height = Math.min($input.scrollHeight, 120) + 'px';
  }

  $input.addEventListener('input', autoResize);

  // ── Init ───────────────────────────────────────
  connect();
})();
</script>
</body>
</html>
